name: Portfolio Newsletter

on:
  schedule:
    # Freitags 15:00 UTC = 17:00 CET (Winter) / 16:00 CEST (Sommer)
    - cron: "0 15 * * 5"
  workflow_dispatch:
    # Ermöglicht manuellen Start jederzeit über GitHub UI (Button "Run workflow")

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Newsletter versenden
        env:
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:   ${{ secrets.RECIPIENT_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python newsletter.py
